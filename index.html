<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LdA Uploader</title>
    <link rel="stylesheet" href="src/renderer/css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>LdA Uploader</h1>
        </header>
        
        <main class="content">
            <div class="status" id="status">
                Servidor UDP escuchando en el puerto 2233
            </div>
            
            <form id="settingsForm" class="settings">
                <h2>Configuración</h2>
                <div class="form-group">
                    <label for="username">Usuario LdA:</label>
                    <input type="text" id="username" name="username" placeholder="Tu usuario de LdA" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña LdA:</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </div>
                <div class="form-group">
                    <label for="callsign">Indicativo:</label>
                    <input type="text" id="callsign" name="callsign" placeholder="TU_INDICATIVO" required>
                </div>
                <button type="submit" id="saveSettings">Guardar Configuración</button>
            </form>

            <section class="log-section">
                <h2>Registro de Actividad</h2>
                <div class="log" id="log"></div>
            </section>
        </main>
    </div>

    <!-- Cargar scripts como módulos ES -->
    <script type="module" src="src/renderer/js/app.js"></script>
</body>
</html>
